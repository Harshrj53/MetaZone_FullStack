version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: metazone_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metazone
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: metazone_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:root@database:3306/metazone
      - JWT_SECRET=supersecretmetazone123
      - PORT=3000
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
    container_name: metazone_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  db_data:
